<!DOCTYPE html>
<html lang="pt-BR" ng-app="appEscolar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Escolar</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body ng-controller="AppController">

    <div class="container min-vh-100 d-flex justify-content-center align-items-center py-5">
        <div class="card app-card shadow-lg w-100">

            <div class="card-body p-4 p-md-5" ng-if="!logado">
                <h2 class="text-center fw-bold mb-2 text-light">Sistema Escolar</h2>
                <p class="text-center text-secondary mb-4">Login e cadastro de usuários</p>

                <ul class="nav nav-pills mb-4 row g-2">
                    <li class="col-6">
                        <button type="button" class="btn w-100 tab-btn"
                            ng-class="aba === 'login' ? 'btn-light text-dark fw-semibold' : 'btn-outline-light'"
                            ng-click="trocarAba('login')">
                            Login
                        </button>
                    </li>
                    <li class="col-6">
                        <button type="button" class="btn w-100 tab-btn"
                            ng-class="aba === 'cadastro' ? 'btn-light text-dark fw-semibold' : 'btn-outline-light'"
                            ng-click="trocarAba('cadastro')">
                            Cadastro
                        </button>
                    </li>
                </ul>

                <form ng-if="aba === 'login'" ng-submit="fazerLogin()">
                    <div class="mb-3">
                        <label class="form-label text-light">Nome</label>
                        <input type="text" class="form-control custom-input" ng-model="login.nome" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-light">Tipo</label>
                        <select class="form-select custom-input" ng-model="login.tipo" required>
                            <option value="">Selecione</option>
                            <option value="Aluno">Aluno</option>
                            <option value="Professor">Professor</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-light text-dark w-100 fw-semibold">
                        Entrar
                    </button>
                </form>

                <form ng-if="aba === 'cadastro'" ng-submit="cadastrarUsuario()">
                    <div class="mb-3">
                        <label class="form-label text-light">Nome</label>
                        <input type="text" class="form-control custom-input" ng-model="cadastro.nome" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-light">Tipo</label>
                        <select class="form-select custom-input" ng-model="cadastro.tipo" required>
                            <option value="">Selecione</option>
                            <option value="Aluno">Aluno</option>
                            <option value="Professor">Professor</option>
                        </select>
                    </div>

                    <div class="mb-4" ng-if="cadastro.tipo === 'Professor'">
                        <label class="form-label text-light d-block mb-3">
                            Selecione quais matérias quer lecionar:
                        </label>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="p-3 rounded border bg-dark-subtle-custom h-100">
                                    <h5 class="text-light text-center mb-3">Disponíveis</h5>

                                    <button type="button" class="btn btn-outline-light w-100 mb-2"
                                        ng-repeat="materia in materiasDisponiveis"
                                        ng-click="selecionarMateriaCadastro(materia)">
                                        {{ materia.nome }}
                                    </button>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="p-3 rounded border bg-dark-subtle-custom h-100">
                                    <h5 class="text-light text-center mb-3">Já selecionadas</h5>

                                    <button type="button" class="btn btn-light w-100 mb-2"
                                        ng-repeat="materia in materiasSelecionadasCadastro"
                                        ng-click="removerMateriaCadastro(materia)">
                                        {{ materia.nome }}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-outline-light w-100 fw-semibold">
                        Cadastrar
                    </button>
                </form>

                <p class="text-center mt-4 mb-0 feedback-text">{{ retorno }}</p>
            </div>

            <div class="card-body p-4 p-md-5 text-center" ng-if="logado">
                <h1 class="h3 fw-bold text-light mb-3" ng-bind="mensagem"></h1>

                <div class="user-box mb-4">
                    <p class="mb-2 text-light">
                        <strong>Nome:</strong> {{ usuario.nome }}
                    </p>
                    <p class="mb-2 text-light">
                        <strong>Tipo:</strong> {{ usuario.tipo }}
                    </p>

                    <div ng-if="usuario.tipo === 'Professor'">
                        <p class="mb-2 text-light">
                            <strong>Matérias cadastradas:</strong>
                        </p>

                        <div ng-if="usuario.materias.length > 0">
                            <span class="badge text-bg-light me-2 mb-2" ng-repeat="materia in usuario.materiasNomes">
                                {{ materia }}
                            </span>
                        </div>

                        <p class="text-secondary mb-0" ng-if="usuario.materias.length === 0">
                            Nenhuma matéria cadastrada.
                        </p>
                    </div>
                </div>

                <img ng-if="usuario.tipo === 'Aluno'" src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
                    alt="Aluno" class="img-fluid rounded user-image mb-4" width="150">

                <img ng-if="usuario.tipo === 'Professor'" src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png"
                    alt="Professor" class="img-fluid rounded user-image mb-4" width="150">

                <div class="d-flex justify-content-center gap-2 flex-wrap mb-4">
                    <button ng-if="usuario.tipo === 'Professor'" type="button"
                        class="btn btn-outline-light px-4 fw-semibold" ng-click="visualizarMaterias()">
                        Visualizar matérias
                    </button>

                    <button type="button" class="btn btn-outline-light px-4 fw-semibold" ng-click="logout()">
                        Logout
                    </button>
                </div>

                <div class="mt-3" ng-if="mostrarMaterias && usuario.tipo === 'Professor'">
                    <label class="form-label text-light d-block mb-3">
                        Selecione quais matérias quer lecionar:
                    </label>

                    <div class="row g-3 text-start">
                        <div class="col-md-6">
                            <div class="p-3 rounded border bg-dark-subtle-custom h-100">
                                <h5 class="text-light text-center mb-3">Disponíveis</h5>

                                <button type="button" class="btn btn-outline-light w-100 mb-2"
                                    ng-repeat="materia in materiasDisponiveisEdicao"
                                    ng-click="selecionarMateriaEdicao(materia)">
                                    {{ materia.nome }}
                                </button>

                                <p class="text-secondary text-center mb-0"
                                    ng-if="materiasDisponiveisEdicao.length === 0">
                                    Nenhuma disponível
                                </p>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="p-3 rounded border bg-dark-subtle-custom h-100">
                                <h5 class="text-light text-center mb-3">Já selecionadas</h5>

                                <button type="button" class="btn btn-light w-100 mb-2"
                                    ng-repeat="materia in materiasSelecionadasEdicao"
                                    ng-click="removerMateriaEdicao(materia)">
                                    {{ materia.nome }}
                                </button>

                                <p class="text-secondary text-center mb-0"
                                    ng-if="materiasSelecionadasEdicao.length === 0">
                                    Nenhuma selecionada
                                </p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-3 d-flex justify-content-center gap-2 flex-wrap">
                        <button type="button" class="btn btn-light text-dark fw-semibold"
                            ng-click="salvarMateriasProfessor()">
                            Salvar matérias
                        </button>

                        <button type="button" class="btn btn-outline-light fw-semibold" ng-click="fecharMaterias()">
                            Fechar
                        </button>
                    </div>
                </div>

                <p class="text-center mt-4 mb-0 feedback-text">{{ retorno }}</p>
            </div>

        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
