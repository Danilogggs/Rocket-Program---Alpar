<!DOCTYPE html>
<html lang="pt-BR" ng-app="appEscolar">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro Escolar</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body ng-controller="AppController" class="bg-dark text-light">

    <div class="container min-vh-100 d-flex justify-content-center align-items-center">
        <div class="card bg-secondary text-light shadow-lg p-4 w-100" style="max-width: 500px;">
            <div class="card-body text-center">
                <h1 class="h3 mb-4" ng-bind="mensagem"></h1>

                <p class="mb-2">
                    <strong>Nome:</strong> {{ usuario.nome }}
                </p>

                <p class="mb-4">
                    <strong>Tipo:</strong> <span ng-bind="usuario.tipo"></span>
                </p>

                <img ng-if="usuario.tipo === 'Aluno'" src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
                    alt="Aluno" class="img-fluid rounded" width="150" />

                <img ng-if="usuario.tipo === 'Professor'" src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png"
                    alt="Professor" class="img-fluid rounded" width="150" />
            </div>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
