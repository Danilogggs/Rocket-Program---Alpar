<!--
Você vai simular um sistema de automação de luzes de uma casa usando JavaScript.
Objetivo:
Crie uma classe CentralDeLuzes que siga o padrão Singleton, ou seja, só pode existir uma
instância dessa central.
Essa central será responsável por ligar e desligar as luzes de diferentes cômodos da casa
ao clicar em botões da interface.
Requisitos:
 Implemente a classe CentralDeLuzes com os métodos:
 ligar(comodo)
 desligar(comodo)
 Garanta que só exista uma instância da central, independente de quantas vezes
for instanciada.
No HTML, crie botões com as propriedades data-comodo="quarto", data-comodo="sala"
etc.
Adicione event listeners nos botões. Quando o botão for clicado:
Deve chamar ligar() ou desligar() da central e mostrar na tela: "Luz do [cômodo] ligada" ou
"desligada"
Use CentralDeLuzes.getInstance() para controlar o acesso à instância
Use document.querySelectorAll() + addEventListener() para escutar os botões
Faça a luz "acender" mudando a cor do fundo de uma div representando o cômodo.
Guarde esse desafio no repositório de sempre na pasta: automacao-luzes
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central de Luzes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container py-4">
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="comodo d-flex align-items-center justify-content-center rounded" id="quarto">quarto</div>
        <div class="d-flex flex-wrap gap-2 mb-3 mt-2">
          <button class="btn btn-success" data-acao="ligar" data-comodo="quarto">Ligar Quarto</button>
          <button class="btn btn-danger" data-acao="desligar" data-comodo="quarto">Desligar Quarto</button>
        </div>
      </div>

      <div class="col-md-4">
        <div class="comodo d-flex align-items-center justify-content-center rounded" id="sala">sala</div>
        <div class="d-flex flex-wrap gap-2 mb-3 mt-2">
          <button class="btn btn-success" data-acao="ligar" data-comodo="sala">Ligar Sala</button>
          <button class="btn btn-danger" data-acao="desligar" data-comodo="sala">Desligar Sala</button>
        </div>
      </div>

      <div class="col-md-4">
        <div class="comodo d-flex align-items-center justify-content-center rounded" id="cozinha">cozinha</div>
        <div class="d-flex flex-wrap gap-2 mb-3 mt-2">
          <button class="btn btn-success" data-acao="ligar" data-comodo="cozinha">Ligar Cozinha</button>
          <button class="btn btn-danger" data-acao="desligar" data-comodo="cozinha">Desligar Cozinha</button>
        </div>
      </div>
    </div>

    <p id="mensagem" class="fw-bold"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
