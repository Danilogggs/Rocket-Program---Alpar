<!DOCTYPE html>
<html lang="pt-BR" ng-app="validacaoApp">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validação com Regex</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">

</head>

<body ng-controller="ValidacaoController">

    <div class="container">
        <div class="container-box">
            <h2 class="text-center mb-4">Validação com Regex</h2>

            <form ng-submit="validarFormulario($event)" novalidate>
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome</label>
                    <input type="text" id="nome" class="form-control" ng-model="form.nome" ng-class="{
              'valido': resultado.nome === true,
              'invalido': resultado.nome === false
            }" />
                    <div class="mensagem" ng-if="resultado.nome !== null">
                        <span class="text-success" ng-if="resultado.nome">Válido</span>
                        <span class="text-danger" ng-if="resultado.nome === false">Inválido</span>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="text" id="email" class="form-control" ng-model="form.email" ng-class="{
              'valido': resultado.email === true,
              'invalido': resultado.email === false
            }" />
                    <div class="mensagem" ng-if="resultado.email !== null">
                        <span class="text-success" ng-if="resultado.email">Válido</span>
                        <span class="text-danger" ng-if="resultado.email === false">Inválido</span>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="cpf" class="form-label">CPF</label>
                    <input type="text" id="cpf" class="form-control" ng-model="form.cpf" ng-class="{
              'valido': resultado.cpf === true,
              'invalido': resultado.cpf === false
            }" />
                    <div class="mensagem" ng-if="resultado.cpf !== null">
                        <span class="text-success" ng-if="resultado.cpf">Válido</span>
                        <span class="text-danger" ng-if="resultado.cpf === false">Inválido</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Validar
                </button>
            </form>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
