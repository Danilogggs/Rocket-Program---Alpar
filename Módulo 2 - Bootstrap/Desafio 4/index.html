<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form - Desafio 4</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="min-vh-100 m-0 bg-light">
  <div class="container py-5">
    <div class="mx-auto" style="max-width: 520px;">
      <h1 class="h4 mb-3 d-flex justify-content-center">Contato</h1>

      <form id="contactForm" novalidate class="border border-2 rounded-5 border-info p-5">
        <div class="form-group mb-3">
          <label for="fullName" class="form-label">Nome</label>
          <input type="text" id="fullName" class="form-control" placeholder="Seu nome">
          <div class="invalid-feedback">Informe seu nome.</div>
        </div>

        <div class="form-group mb-3">
          <label for="email" class="form-label">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seuemail@exemplo.com">
          <div class="invalid-feedback">Informe um e-mail válido.</div>
        </div>

        <div class="form-group mb-3">
          <label for="subject" class="form-label">Assunto</label>
          <select id="subject" class="form-select">
            <option value="">Selecione...</option>
            <option value="duvida">Dúvida</option>
            <option value="orcamento">Orçamento</option>
            <option value="suporte">Suporte</option>
          </select>
          <div class="invalid-feedback">Selecione um assunto.</div>
        </div>

        <div class="form-group mb-3">
          <label for="message" class="form-label">Mensagem</label>
          <textarea id="message" class="form-control" rows="4" placeholder="Escreva sua mensagem..."></textarea>
          <div class="invalid-feedback">Escreva uma mensagem de até 5 caracteres.</div>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="terms">
          <label class="form-check-label" for="terms">
            Concordo em enviar meus dados
          </label>
          <div class="invalid-feedback">Marque para continuar.</div>
        </div>

        <button class="btn btn-primary w-100" type="submit">Enviar</button>

        <div id="successMessage" class="alert alert-success d-none my-4" role="alert">
          Mensagem enviada com sucesso!
        </div>
      </form>
    </div>
  </div>

  <script>
    const contactForm = document.getElementById("contactForm");
    const successMessage = document.getElementById("successMessage");

    function markField(field, isValid) {
      field.classList.remove("is-valid", "is-invalid");
      field.classList.add(isValid ? "is-valid" : "is-invalid");
      return isValid;
    }

    contactForm.addEventListener("submit", (e) => {
      e.preventDefault();
      successMessage.classList.add("d-none");

      const fullName = document.getElementById("fullName");
      const email = document.getElementById("email");
      const subject = document.getElementById("subject");
      const message = document.getElementById("message");
      const terms = document.getElementById("terms");

      const isEmailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim());

      const isNameValid = markField(fullName, fullName.value.trim().length >= 2);
      const isEmailFieldValid = markField(email, isEmailValid);
      const isSubjectValid = markField(subject, subject.value !== "");
      const isMessageValid = markField(message, message.value.trim().length >= 5);

      terms.classList.remove("is-invalid");
      const isTermsChecked = terms.checked;
      if (!isTermsChecked) terms.classList.add("is-invalid");

      const isFormValid =
        isNameValid &&
        isEmailFieldValid &&
        isSubjectValid &&
        isMessageValid &&
        isTermsChecked;

      if (isFormValid) {
        successMessage.classList.remove("d-none");
        contactForm.reset();

        [fullName, email, subject, message].forEach(f => f.classList.remove("is-valid", "is-invalid"));
        terms.classList.remove("is-invalid");
      }
    });
  </script>
</body>

</html>
