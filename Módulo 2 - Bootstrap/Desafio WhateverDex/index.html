<!-- 
Nos idos dos anos 1990 fomos (eu fui, vocês não rs) pegos pela febre Pokémon! Bichinhos lutando em arenas para conseguir insígnias e se tornar o maior mestre Pokémon do mundo! Ash Ketchum nos ensinou sobre perseverança e alcançar nossos sonhos e objetivos, e nos mostrou também que os pokémons que ele capturava eram armazenados em um dispositivo criado pelo Professor Carvalho, chamado Pokédex.
 
Então significa que vocês montarão uma Pokédex? Não! Vocês montarão uma "WhateverDex"
 
O que é uma WhaateverDex? Um dispositivo de armazenamento, DO QUE VOCÊ QUISER! Você pode criar uma Dex inspirada nos monstrinhos do Ben 10, magias e potions de D&D, armamentos disponíveis em MapleStory, ou até mesmo a discografia de uma banda!
 
Embora os exemplos aqui sejam mais voltados a jogos, a criatividade está liberada! Mas existem algumas coisas que vocês precisam se atentar, que são obrigatórias:
 
- Precisa ter uma lista de cards
- A interface visual precisa ser organizada
- Precisa ter uma busca ou filtro
- Detalhes precisam poder ser visualizados
- Cada item precisa ter pelo menos: nome, imagem, descrição. Demais elementos devem ser orientados de acordo com a dex de vocês (por exemplo: se eu escolho fazer uma dex de batons, posso colocar como um elemento do card a marca do batom)
- MÍNIMO DE 10 ITENS
 
Utilizem o que vocês aprenderam sobre HTML, CSS, JS para Web e Bootstrap para realizar o desafio. 
Esse projeto deverá ser entregue dia 10/03
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuteDex</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

    <nav id="mainNavbar" class="navbar navbar-expand-lg bg-light border-bottom">
        <div class="container">
            <a class="navbar-brand" href="#">FuteDex</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav ms-auto align-items-lg-center">

                    <li class="nav-item">
                        <button type="button"
                            class="nav-link btn btn-link text-decoration-none d-flex align-items-center gap-2"
                            data-bs-toggle="modal" data-bs-target="#modalConfig">
                            <i class="bi bi-gear"></i>
                            <span id="configNavText">Configurações</span>
                        </button>
                    </li>

                    <li class="nav-item">
                        <form id="searchForm" class="nav-link d-flex align-items-center gap-2" role="search">
                            <input id="searchInput" class="form-control me-2" type="search"
                                placeholder="Ex: Corinthians" aria-label="Pesquisar">
                            <button id="searchButton" class="btn btn-outline-secondary" type="submit">Pesquisar</button>
                        </form>
                    </li>

                    <li class="nav-item">
                        <div class="nav-link d-flex align-items-center gap-2">
                            <button id="fillTeamsBtn" class="btn btn-outline-secondary" type="button">
                                Mostrar todos os times
                            </button>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="modal fade" id="welcomeModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <span class="d-block">Bem-vindo</span>
                        <span class="d-block">Welcome</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="FuteDex"></button>
                </div>
                <div class="modal-body">
                    Site de informações de times brasileiros. Use sem moderação :3
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalConfig" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div id="configModalContent" class="modal-content">
                <div class="modal-header">
                    <h5 id="configModalTitle" class="modal-title">Configurações</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body d-flex flex-column gap-3">
                    <div class="form-check form-switch d-flex justify-content-between align-items-center">
                        <label class="form-check-label" for="darkModeSwitch">Dark mode</label>
                        <input class="form-check-input" type="checkbox" id="darkModeSwitch">
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <span id="languageLabel">Idioma</span>
                        <button id="languageToggleBtn" type="button" class="btn btn-outline-primary btn-sm">
                            English
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main class="container py-4">
        <div id="teamsList" class="row g-4"></div>

        <div class="text-center mt-4">
            <button id="loadMoreButton" class="btn btn-primary">
                Carregar mais
            </button>
        </div>
    </main>
    <script src="./assets/JS/scripts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
